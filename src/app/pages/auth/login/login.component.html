<div class="auth-page">
  <!-- Background -->
  <div class="auth-bg">
    <div class="bg-shape bg-shape-1"></div>
    <div class="bg-shape bg-shape-2"></div>
    <div class="bg-shape bg-shape-3"></div>
  </div>

  <div class="auth-container">
    <!-- Left: Branding -->
    <div class="auth-branding">
      <a routerLink="/" class="auth-logo">
        <svg width="40" height="40" viewBox="0 0 32 32" fill="none">
          <rect x="2" y="2" width="28" height="28" rx="8" stroke="currentColor" stroke-width="2"/>
          <circle cx="16" cy="16" r="6" fill="currentColor"/>
        </svg>
        <span>Survey<span class="highlight">Basket</span></span>
      </a>
      <h1>Welcome Back</h1>
      <p>Sign in to access your dashboard, manage polls, and collaborate with your team.</p>
      <div class="auth-features">
        <div class="feature">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
          Real-time collaboration
        </div>
        <div class="feature">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
          Secure file management
        </div>
        <div class="feature">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
          Advanced analytics
        </div>
      </div>
    </div>

    <!-- Right: Form -->
    <div class="auth-form-wrapper glass-strong">
      <h2>Sign In</h2>
      <p class="form-subtitle">Enter your credentials to continue</p>

      @if (errorMessage) {
        <div class="alert alert-error">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
          {{ errorMessage }}
        </div>
      }

      <form (ngSubmit)="onLogin()">
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" class="input-3d" placeholder="you@example.com"
                 [(ngModel)]="form.email" name="email" required />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" class="input-3d" placeholder="••••••••"
                 [(ngModel)]="form.password" name="password" required />
        </div>
        <button type="submit" class="btn-primary btn-full" [disabled]="loading">
          {{ loading ? 'Signing in...' : 'Sign In' }}
          <svg *ngIf="!loading" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        </button>
      </form>

      <div class="auth-footer">
        <span>Don't have an account?</span>
        <a routerLink="/register">Create one</a>
      </div>
    </div>
  </div>
</div>
